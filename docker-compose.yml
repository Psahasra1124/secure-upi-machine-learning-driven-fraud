services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_upi
      POSTGRES_USER: secure_upi
      POSTGRES_PASSWORD: secure_upi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure_upi -d secure_upi"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      APP_NAME: Secure UPI
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-replace-this-secret-before-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      DATABASE_URL: postgresql+psycopg2://secure_upi:secure_upi@db:5432/secure_upi
      CORS_ORIGINS: http://localhost:3000,http://localhost
      MODEL_PATH: /app/ml/artifacts/fraud_model.joblib
      MODEL_METADATA_PATH: /app/ml/artifacts/model_metadata.json
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@secureupi.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api/v1
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
